<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#8B5CF6" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>

  <!-- Subtle grid lines (tech feel) -->
  <line x1="0" y1="48" x2="192" y2="48" stroke="#8B5CF6" stroke-width="0.4" opacity="0.2"/>
  <line x1="0" y1="96" x2="192" y2="96" stroke="#8B5CF6" stroke-width="0.4" opacity="0.2"/>
  <line x1="0" y1="144" x2="192" y2="144" stroke="#8B5CF6" stroke-width="0.4" opacity="0.2"/>
  <line x1="48" y1="0" x2="48" y2="192" stroke="#8B5CF6" stroke-width="0.4" opacity="0.2"/>
  <line x1="96" y1="0" x2="96" y2="192" stroke="#8B5CF6" stroke-width="0.4" opacity="0.2"/>
  <line x1="144" y1="0" x2="144" y2="192" stroke="#8B5CF6" stroke-width="0.4" opacity="0.2"/>

  <!-- Corner dots -->
  <circle cx="28" cy="28" r="3" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="164" cy="28" r="3" fill="#06B6D4" opacity="0.5"/>
  <circle cx="28" cy="164" r="3" fill="#06B6D4" opacity="0.5"/>
  <circle cx="164" cy="164" r="3" fill="#8B5CF6" opacity="0.5"/>

  <!-- Glowing circle behind icon -->
  <circle cx="96" cy="78" r="44" fill="url(#glow)"/>

  <!-- Book shape -->
  <rect x="62" y="44" width="68" height="74" rx="5" fill="none" stroke="url(#accent)" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="62" y="44" width="34" height="74" rx="5" fill="#8B5CF6" opacity="0.15"/>
  <!-- Spine line -->
  <line x1="96" y1="44" x2="96" y2="118" stroke="url(#accent)" stroke-width="2"/>
  <!-- Book lines (pages) -->
  <line x1="102" y1="62" x2="122" y2="62" stroke="#06B6D4" stroke-width="1.5" opacity="0.7"/>
  <line x1="102" y1="72" x2="122" y2="72" stroke="#06B6D4" stroke-width="1.5" opacity="0.7"/>
  <line x1="102" y1="82" x2="118" y2="82" stroke="#06B6D4" stroke-width="1.5" opacity="0.5"/>
  <!-- Circuit dot on book -->
  <circle cx="79" cy="81" r="6" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.8"/>
  <circle cx="79" cy="81" r="2.5" fill="#8B5CF6" opacity="0.9"/>
  <line x1="79" y1="62" x2="79" y2="75" stroke="#8B5CF6" stroke-width="1.2" opacity="0.6"/>
  <line x1="79" y1="87" x2="79" y2="100" stroke="#8B5CF6" stroke-width="1.2" opacity="0.6"/>

  <!-- EB text -->
  <text x="96" y="148" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="13" font-weight="900" letter-spacing="3" fill="url(#accent)">EXAM BUDDY</text>

  <!-- Bottom glow line -->
  <rect x="56" y="154" width="80" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
</svg>
