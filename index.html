<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exam Buddy — AKTU BTech</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A12;
  --bg2:#12121E;
  --bg3:#1A1A2E;
  --purple:#6C3CE1;
  --purple-light:#8B5CF6;
  --cyan:#06B6D4;
  --cyan-glow:rgba(6,182,212,0.15);
  --green:#10B981;
  --white:#F0EFFF;
  --muted:#6B7280;
  --border:rgba(108,60,225,0.25);
  --border2:rgba(6,182,212,0.2);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(10,10,18,0.85);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5%;height:64px;
}
.logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.3rem;font-weight:800;
  color:var(--white);
  display:flex;align-items:center;gap:0.5rem;
}
.logo-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 10px var(--cyan);
  animation:pulse-dot 2s infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.85)}}
.nav-tabs{display:flex;gap:0.25rem}
.nav-tab{
  background:none;border:none;
  color:var(--muted);
  font-family:'Inter',sans-serif;
  font-size:0.85rem;font-weight:500;
  padding:0.5rem 1rem;border-radius:8px;
  cursor:pointer;transition:all 0.2s;
}
.nav-tab:hover,.nav-tab.active{background:rgba(108,60,225,0.15);color:var(--white)}
.nav-tab.active{color:var(--purple-light)}
.nav-scanner-btn{
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  color:var(--white);
  border:none;
  padding:0.5rem 1.25rem;
  border-radius:8px;
  font-size:0.85rem;font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;gap:0.4rem;
}
.nav-scanner-btn:hover{opacity:0.9;transform:translateY(-1px)}

/* PAGES */
.page{display:none;min-height:100vh}
.page.active{display:block}

/* ═══════════════ HOME PAGE ═══════════════ */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:100px 5% 60px;
  position:relative;
  overflow:hidden;
}
.hero-glow{
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(108,60,225,0.18) 0%, transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}
.hero-glow2{
  position:absolute;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 70%);
  top:30%;right:10%;
  pointer-events:none;
}
.hero-chip{
  display:inline-flex;align-items:center;gap:0.5rem;
  background:rgba(6,182,212,0.1);
  border:1px solid var(--border2);
  color:var(--cyan);
  padding:0.35rem 1rem;
  border-radius:100px;
  font-size:0.75rem;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;margin-bottom:1.5rem;
}
.hero h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(2.5rem,6vw,4.5rem);
  font-weight:800;line-height:1.05;
  margin-bottom:1.25rem;
  max-width:750px;
}
.hero h1 .grad{
  background:linear-gradient(90deg,var(--purple-light),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{
  color:rgba(240,239,255,0.6);
  font-size:1.05rem;max-width:520px;
  margin-bottom:2.5rem;line-height:1.7;
}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-bottom:3rem}
.btn-grad{
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  color:var(--white);border:none;
  padding:0.875rem 2rem;border-radius:10px;
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:all 0.2s;
  box-shadow:0 4px 24px rgba(108,60,225,0.35);
  display:flex;align-items:center;gap:0.5rem;
}
.btn-grad:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(108,60,225,0.45)}
.btn-outline{
  background:transparent;
  color:var(--white);
  border:1px solid var(--border);
  padding:0.875rem 2rem;border-radius:10px;
  font-size:1rem;font-weight:500;cursor:pointer;
  transition:all 0.2s;
}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan)}

/* Floating subject cards */
.subject-chips{
  display:flex;flex-wrap:wrap;gap:0.75rem;
  justify-content:center;max-width:700px;
}
.subject-chip{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  padding:0.5rem 1rem;border-radius:8px;
  font-size:0.8rem;color:rgba(240,239,255,0.7);
  cursor:pointer;transition:all 0.2s;
  font-weight:500;
}
.subject-chip:hover{
  background:rgba(108,60,225,0.15);
  border-color:var(--purple-light);
  color:var(--purple-light);
}

/* Stats */
.stats-bar{
  display:flex;gap:3rem;flex-wrap:wrap;justify-content:center;
  padding:2rem 5%;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.02);
}
.stat-item{text-align:center}
.stat-num{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.8rem;font-weight:700;
  background:linear-gradient(90deg,var(--purple-light),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-lbl{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:0.2rem}

/* ═══════════════ SUBJECTS PAGE ═══════════════ */
.page-header{
  padding:100px 5% 2rem;
  background:linear-gradient(180deg,rgba(108,60,225,0.08) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
}
.page-header h2{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(1.8rem,3vw,2.5rem);font-weight:700;
  margin-bottom:0.5rem;
}
.page-header p{color:var(--muted);font-size:0.95rem}

.branch-filter{
  display:flex;gap:0.5rem;flex-wrap:wrap;
  padding:1.5rem 5%;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.branch-btn{
  background:none;border:1px solid var(--border);
  color:var(--muted);
  padding:0.4rem 1rem;border-radius:6px;
  font-size:0.8rem;font-weight:500;cursor:pointer;
  transition:all 0.2s;font-family:'Inter',sans-serif;
}
.branch-btn.active,.branch-btn:hover{
  background:rgba(108,60,225,0.2);
  border-color:var(--purple-light);color:var(--white);
}

.subjects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1.25rem;
  padding:2rem 5%;
}
.subject-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.75rem;
  cursor:pointer;
  transition:all 0.25s;
  position:relative;
  overflow:hidden;
}
.subject-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(108,60,225,0.07),transparent);
  opacity:0;transition:opacity 0.25s;
}
.subject-card:hover{border-color:var(--purple-light);transform:translateY(-3px);box-shadow:0 8px 32px rgba(108,60,225,0.15)}
.subject-card:hover::before{opacity:1}
.subj-icon{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;margin-bottom:1rem;
}
.subj-name{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.05rem;font-weight:600;
  margin-bottom:0.35rem;
}
.subj-code{font-size:0.75rem;color:var(--muted);margin-bottom:0.75rem;letter-spacing:0.05em}
.subj-meta{
  display:flex;gap:0.75rem;align-items:center;
  font-size:0.75rem;color:var(--muted);
}
.subj-badge{
  padding:0.2rem 0.6rem;border-radius:5px;
  font-size:0.7rem;font-weight:600;
}

/* ═══════════════ QUESTIONS PAGE ═══════════════ */
.questions-header{
  padding:90px 5% 1.5rem;
  display:flex;align-items:center;gap:1rem;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.back-btn{
  background:none;border:1px solid var(--border);
  color:var(--muted);
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.1rem;transition:all 0.2s;
  flex-shrink:0;
}
.back-btn:hover{border-color:var(--purple-light);color:var(--white)}
.qheader-info h3{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.3rem;font-weight:700;
}
.qheader-info span{font-size:0.8rem;color:var(--muted)}

.year-tabs{
  display:flex;gap:0.5rem;padding:1rem 5%;
  border-bottom:1px solid var(--border);
  background:var(--bg2);overflow-x:auto;
  scrollbar-width:none;
}
.year-tabs::-webkit-scrollbar{display:none}
.year-tab{
  background:none;border:1px solid var(--border);
  color:var(--muted);
  padding:0.4rem 1rem;border-radius:6px;
  font-size:0.8rem;font-weight:500;cursor:pointer;
  transition:all 0.2s;white-space:nowrap;
  font-family:'Inter',sans-serif;
}
.year-tab.active,.year-tab:hover{background:rgba(6,182,212,0.15);border-color:var(--cyan);color:var(--cyan)}

.questions-list{padding:1.5rem 5%}
.q-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5rem;
  margin-bottom:1rem;
  transition:all 0.2s;
  display:flex;align-items:flex-start;gap:1rem;
}
.q-card:hover{border-color:var(--purple-light)}
.q-num{
  width:32px;height:32px;
  border-radius:8px;
  background:rgba(108,60,225,0.15);
  border:1px solid rgba(108,60,225,0.3);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;
  font-size:0.8rem;font-weight:700;color:var(--purple-light);
  flex-shrink:0;margin-top:2px;
}
.q-body{flex:1}
.q-text{font-size:0.95rem;line-height:1.65;margin-bottom:0.75rem;color:rgba(240,239,255,0.9)}
.q-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem}
.q-tags{display:flex;gap:0.5rem;flex-wrap:wrap}
.q-tag{
  font-size:0.7rem;font-weight:600;
  padding:0.2rem 0.6rem;border-radius:5px;
  letter-spacing:0.04em;
}
.tag-unit{background:rgba(108,60,225,0.15);color:var(--purple-light);border:1px solid rgba(108,60,225,0.25)}
.tag-marks{background:rgba(16,185,129,0.12);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
.tag-freq{background:rgba(6,182,212,0.1);color:var(--cyan);border:1px solid rgba(6,182,212,0.2)}
.watch-btn{
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  color:var(--white);border:none;
  padding:0.45rem 1rem;border-radius:7px;
  font-size:0.8rem;font-weight:600;cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;gap:0.35rem;
  white-space:nowrap;
}
.watch-btn:hover{opacity:0.85;transform:translateY(-1px)}

/* ═══════════════ SCANNER PAGE ═══════════════ */
.scanner-wrap{
  padding:90px 5% 3rem;
  max-width:700px;margin:0 auto;
}
.scanner-wrap h2{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.8rem;font-weight:700;
  margin-bottom:0.5rem;
}
.scanner-wrap>p{color:var(--muted);margin-bottom:2rem;font-size:0.95rem}

.scanner-box{
  background:var(--bg2);
  border:2px dashed rgba(108,60,225,0.35);
  border-radius:20px;
  padding:3rem 2rem;
  text-align:center;
  margin-bottom:1.5rem;
  cursor:pointer;
  transition:all 0.25s;
  position:relative;
  overflow:hidden;
}
.scanner-box:hover{border-color:var(--cyan);background:rgba(6,182,212,0.04)}
.scanner-box.scanning{border-color:var(--cyan);border-style:solid}
.scanner-anim{
  width:90px;height:90px;
  border-radius:50%;
  background:linear-gradient(135deg,rgba(108,60,225,0.2),rgba(6,182,212,0.2));
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;margin:0 auto 1.25rem;
  border:2px solid var(--border2);
  transition:all 0.3s;
}
.scanner-box:hover .scanner-anim{
  border-color:var(--cyan);
  box-shadow:0 0 24px rgba(6,182,212,0.3);
}
.scanner-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.1rem;font-weight:600;margin-bottom:0.5rem;
}
.scanner-sub{font-size:0.85rem;color:var(--muted)}

/* scan line animation */
.scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  box-shadow:0 0 12px var(--cyan);
  animation:scanline 2s linear infinite;
  display:none;
}
.scanning .scan-line{display:block}
@keyframes scanline{
  0%{top:10%}100%{top:90%}
}

.or-divider{
  display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;
  color:var(--muted);font-size:0.85rem;
}
.or-divider::before,.or-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}

.search-bar{
  display:flex;gap:0.75rem;margin-bottom:2rem;
}
.search-input{
  flex:1;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:0.875rem 1.25rem;
  color:var(--white);
  font-size:0.95rem;
  font-family:'Inter',sans-serif;
  outline:none;transition:border-color 0.2s;
}
.search-input:focus{border-color:var(--cyan)}
.search-input::placeholder{color:var(--muted)}
.search-btn{
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  color:var(--white);border:none;
  padding:0 1.5rem;border-radius:10px;
  font-size:0.9rem;font-weight:600;cursor:pointer;
  transition:all 0.2s;white-space:nowrap;
}
.search-btn:hover{opacity:0.9}

/* Scan result */
.scan-result{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:14px;
  padding:1.75rem;
  display:none;
}
.scan-result.show{display:block}
.result-label{
  font-size:0.7rem;font-weight:600;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--cyan);margin-bottom:0.75rem;
  display:flex;align-items:center;gap:0.4rem;
}
.result-q{
  font-size:1rem;line-height:1.6;margin-bottom:1.5rem;
  border-left:3px solid var(--purple-light);padding-left:1rem;
}
.result-videos-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:1rem;font-weight:600;margin-bottom:1rem;
}
.video-cards{display:flex;flex-direction:column;gap:0.75rem}
.video-card{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:10px;
  padding:1rem 1.25rem;
  display:flex;align-items:center;gap:1rem;
  cursor:pointer;transition:all 0.2s;
  text-decoration:none;
}
.video-card:hover{border-color:var(--cyan);background:rgba(6,182,212,0.05)}
.video-thumb{
  width:56px;height:42px;border-radius:7px;
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
}
.video-info{flex:1;min-width:0}
.video-title{
  font-size:0.875rem;font-weight:600;
  margin-bottom:0.2rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.video-meta{font-size:0.75rem;color:var(--muted)}
.video-dur{
  font-size:0.75rem;color:var(--cyan);
  background:rgba(6,182,212,0.1);
  padding:0.2rem 0.5rem;border-radius:5px;
  flex-shrink:0;font-weight:600;
}

/* ═══════════════ VIDEO MODAL ═══════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.85);
  display:none;align-items:center;justify-content:center;
  padding:1rem;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:18px;
  width:100%;max-width:700px;
  overflow:hidden;
  animation:modal-in 0.25s ease;
}
@keyframes modal-in{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-video{
  width:100%;aspect-ratio:16/9;
  background:var(--bg);
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.modal-play-btn{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;cursor:pointer;
  box-shadow:0 0 32px rgba(108,60,225,0.5);
  transition:transform 0.2s;
}
.modal-play-btn:hover{transform:scale(1.08)}
.modal-body{padding:1.5rem}
.modal-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.15rem;font-weight:700;margin-bottom:0.35rem;
}
.modal-sub{font-size:0.85rem;color:var(--muted);margin-bottom:1.25rem}
.modal-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:1.25rem;border-top:1px solid var(--border);
}
.modal-close{
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  color:var(--muted);
  padding:0.5rem 1.25rem;border-radius:8px;
  font-size:0.875rem;cursor:pointer;
  transition:all 0.2s;font-family:'Inter',sans-serif;
}
.modal-close:hover{color:var(--white);border-color:var(--muted)}
.modal-yt-btn{
  background:linear-gradient(135deg,#ff4444,#cc0000);
  color:white;border:none;
  padding:0.5rem 1.25rem;border-radius:8px;
  font-size:0.875rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:0.4rem;
  transition:all 0.2s;
}
.modal-yt-btn:hover{opacity:0.9}

/* FOUNDER */
.founder-section{
  padding:3rem 5%;
  display:flex;flex-direction:column;align-items:center;
  background:var(--bg);
}
.founder-label{
  font-size:0.72rem;font-weight:700;letter-spacing:0.12em;
  text-transform:uppercase;
  color:#FF6BFF;
  margin-bottom:1.25rem;
  display:flex;align-items:center;gap:0.4rem;
}
.founder-card{
  display:flex;align-items:center;gap:1.5rem;
  background:linear-gradient(135deg,rgba(255,107,255,0.07),rgba(255,200,80,0.06));
  border:1px solid rgba(255,107,255,0.3);
  border-radius:18px;
  padding:1.75rem 2.25rem;
  max-width:560px;width:100%;
  position:relative;
  box-shadow:0 0 32px rgba(255,107,255,0.1);
  transition:all 0.3s;
}
.founder-card:hover{
  border-color:rgba(255,107,255,0.6);
  box-shadow:0 0 52px rgba(255,107,255,0.2);
  transform:translateY(-3px);
}
.founder-avatar{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,#FF6BFF,#FFC850);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;
  font-size:1.3rem;font-weight:800;color:#0A0A12;
  flex-shrink:0;
  box-shadow:0 0 20px rgba(255,107,255,0.45);
}
.founder-info{flex:1}
.founder-name{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.25rem;font-weight:800;
  background:linear-gradient(90deg,#FF6BFF,#FFC850);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:0.2rem;
}
.founder-role{
