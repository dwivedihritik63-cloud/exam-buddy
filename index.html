<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exam Buddy — AKTU BTech</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A12;
  --bg2:#12121E;
  --bg3:#1A1A2E;
  --purple:#6C3CE1;
  --purple-light:#8B5CF6;
  --cyan:#06B6D4;
  --cyan-glow:rgba(6,182,212,0.15);
  --green:#10B981;
  --white:#F0EFFF;
  --muted:#6B7280;
  --border:rgba(108,60,225,0.25);
  --border2:rgba(6,182,212,0.2);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(10,10,18,0.85);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5%;height:64px;
}
.logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.3rem;font-weight:800;
  color:var(--white);
  display:flex;align-items:center;gap:0.5rem;
}
.logo-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 10px var(--cyan);
  animation:pulse-dot 2s infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.85)}}
.nav-tabs{display:flex;gap:0.25rem}
.nav-tab{
  background:none;border:none;
  color:var(--muted);
  font-family:'Inter',sans-serif;
  font-size:0.85rem;font-weight:500;
  padding:0.5rem 1rem;border-radius:8px;
  cursor:pointer;transition:all 0.2s;
}
.nav-tab:hover,.nav-tab.active{background:rgba(108,60,225,0.15);color:var(--white)}
.nav-tab.active{color:var(--purple-light)}
.nav-scanner-btn{
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  color:var(--white);
  border:none;
  padding:0.5rem 1.25rem;
  border-radius:8px;
  font-size:0.85rem;font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;gap:0.4rem;
}
.nav-scanner-btn:hover{opacity:0.9;transform:translateY(-1px)}

/* PAGES */
.page{display:none;min-height:100vh}
.page.active{display:block}

/* HOME PAGE */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:100px 5% 60px;
  position:relative;
  overflow:hidden;
}
.hero-glow{
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(108,60,225,0.18) 0%, transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}
.hero-glow2{
  position:absolute;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 70%);
  top:30%;right:10%;
  pointer-events:none;
}
.hero-chip{
  display:inline-flex;align-items:center;gap:0.5rem;
  background:rgba(6,182,212,0.1);
  border:1px solid var(--border2);
  color:var(--cyan);
  padding:0.35rem 1rem;
  border-radius:100px;
  font-size:0.75rem;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;margin-bottom:1.5rem;
}
.hero h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(2.5rem,6vw,4.5rem);
  font-weight:800;line-height:1.05;
  margin-bottom:1.25rem;
  max-width:750px;
}
.hero h1 .grad{
  background:linear-gradient(90deg,var(--purple-light),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{
  color:rgba(240,239,255,0.6);
  font-size:1.05rem;max-width:520px;
  margin-bottom:2.5rem;line-height:1.7;
}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-bottom:3rem}
.btn-grad{
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  color:var(--white);border:none;
  padding:0.875rem 2rem;border-radius:10px;
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:all 0.2s;
  box-shadow:0 4px 24px rgba(108,60,225,0.35);
  display:flex;align-items:center;gap:0.5rem;
}
.btn-grad:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(108,60,225,0.45)}
.btn-outline{
  background:transparent;
  color:var(--white);
  border:1px solid var(--border);
  padding:0.875rem 2rem;border-radius:10px;
  font-size:1rem;font-weight:500;cursor:pointer;
  transition:all 0.2s;
}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan)}
.subject-chips{
  display:flex;flex-wrap:wrap;gap:0.75rem;
  justify-content:center;max-width:700px;
}
.subject-chip{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  padding:0.5rem 1rem;border-radius:8px;
  font-size:0.8rem;color:rgba(240,239,255,0.7);
  cursor:pointer;transition:all 0.2s;
  font-weight:500;
}
.subject-chip:hover{
  background:rgba(108,60,225,0.15);
  border-color:var(--purple-light);
  color:var(--purple-light);
}

/* STATS */
.stats-bar{
  display:flex;gap:3rem;flex-wrap:wrap;justify-content:center;
  padding:2rem 5%;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.02);
}
.stat-item{text-align:center}
.stat-num{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.8rem;font-weight:700;
  background:linear-gradient(90deg,var(--purple-light),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-lbl{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:0.2rem}

/* SUBJECTS PAGE */
.page-header{
  padding:100px 5% 2rem;
  background:linear-gradient(180deg,rgba(108,60,225,0.08) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
}
.page-header h2{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(1.8rem,3vw,2.5rem);font-weight:700;
  margin-bottom:0.5rem;
}
.page-header p{color:var(--muted);font-size:0.95rem}
.branch-filter{
  display:flex;gap:0.5rem;flex-wrap:wrap;
  padding:1.5rem 5%;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.branch-btn{
  background:none;border:1px solid var(--border);
  color:var(--muted);
  padding:0.4rem 1rem;border-radius:6px;
  font-size:0.8rem;font-weight:500;cursor:pointer;
  transition:all 0.2s;font-family:'Inter',sans-serif;
}
.branch-btn.active,.branch-btn:hover{
  background:rgba(108,60,225,0.2);
  border-color:var(--purple-light);color:var(--white);
}
.subjects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1.25rem;
  padding:2rem 5%;
}
.subject-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.75rem;
  cursor:pointer;
  transition:all 0.25s;
  position:relative;
  overflow:hidden;
}
.subject-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(108,60,225,0.07),transparent);
  opacity:0;transition:opacity 0.25s;
}
.subject-card:hover{border-color:var(--purple-light);transform:translateY(-3px);box-shadow:0 8px 32px rgba(108,60,225,0.15)}
.subject-card:hover::before{opacity:1}
.subj-icon{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;margin-bottom:1rem;
}
.subj-name{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.05rem;font-weight:600;
  margin-bottom:0.35rem;
}
.subj-code{font-size:0.75rem;color:var(--muted);margin-bottom:0.75rem;letter-spacing:0.05em}
.subj-meta{
  display:flex;gap:0.75rem;align-items:center;
  font-size:0.75rem;color:var(--muted);
}
.subj-badge{
  padding:0.2rem 0.6rem;border-radius:5px;
  font-size:0.7rem;font-weight:600;
}

/* QUESTIONS PAGE */
.questions-header{
  padding:90px 5% 1.5rem;
  display:flex;align-items:center;gap:1rem;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.back-btn{
  background:none;border:1px solid var(--border);
  color:var(--muted);
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.1rem;transition:all 0.2s;
  flex-shrink:0;
}
.back-btn:hover{border-color:var(--purple-light);color:var(--white)}
.qheader-info h3{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.3rem;font-weight:700;
